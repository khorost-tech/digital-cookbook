services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cookbook
      POSTGRES_USER: cookbook
      POSTGRES_PASSWORD: cookbook
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookbook -d cookbook"]
      interval: 2s
      timeout: 3s
      retries: 15
