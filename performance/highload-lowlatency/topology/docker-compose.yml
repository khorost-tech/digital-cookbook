# ============================================================================
# Стенд highload-lowlatency: HAProxy L7 + пул Go/Java-бэкендов + клиенты-нагрузчики
# ============================================================================
#
# Топология:
#   client-go   --h2c (HTTP/2 cleartext, prior-knowledge)--> haproxy:8080 --\
#                                                                            +--> be_check_pool (proto h2)
#   client-java --HTTP/1.1------------------------------------> haproxy:8081 --/       go-backend-1/2/3, java-backend
#
#   client-grpc-go   --h2c prior-knowledge (grpc.NewClient, insecure)--> haproxy:8090 --\
#                                                                                         +--> be_grpc (proto h2)
#   client-grpc-java --h2c prior-knowledge (ManagedChannel.usePlaintext())--> haproxy:8090 --/   grpc-backend-1/2
#
# Клиенты запускаются по требованию через profiles (см. README, раздел "Запуск"):
#   docker compose --profile load run --rm client-go
#   docker compose --profile load-java run --rm client-java
#   docker compose --profile load-grpc run --rm client-grpc-go
#   docker compose --profile load-grpc-java run --rm client-grpc-java
#
# Почему у Java-клиента отдельный фронтенд :8081, а не :8080 — см.
# комментарий у frontend fe_h1 в haproxy/haproxy.cfg и README стенда
# (JDK java.net.http.HttpClient не умеет h2c prior-knowledge). А вот у
# gRPC-клиентов (Go и Java) такой проблемы нет: у gRPC cleartext-транспорт
# по умолчанию уже prior-knowledge (нет отдельного HTTP/1.1-Upgrade-пути),
# поэтому оба ходят в один и тот же h2c-фронтенд `:8090` (см. frontend
# fe_grpc в haproxy/haproxy.cfg) — это и есть контраст с REST/JDK-веткой.

services:
  haproxy:
    image: haproxy:3.0-alpine
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "8080:8080"   # h2c prior-knowledge (fe_http2) — для client-go
      - "8081:8081"   # HTTP/1.1 (fe_h1) — для client-java (см. haproxy.cfg)
      - "8090:8090"   # h2c prior-knowledge, gRPC (fe_grpc) — для client-grpc-go/client-grpc-java
    depends_on:
      go-backend-1:
        condition: service_healthy
      go-backend-2:
        condition: service_healthy
      go-backend-3:
        condition: service_healthy
      java-backend:
        condition: service_healthy
      grpc-backend-1:
        condition: service_started
      grpc-backend-2:
        condition: service_started
    networks:
      - stand

  # --------------------------------------------------------------------------
  # Пул бэкендов: 3 инстанса Go + 1 инстанс Java, все на одном контракте
  # POST /check + GET /healthz (см. README стенда).
  # --------------------------------------------------------------------------
  go-backend-1:
    build: ../services/go-backend
    environment:
      BACKEND_NAME: go-1
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9000/healthz"]
      interval: 5s
      timeout: 2s
      retries: 5
    networks:
      - stand

  go-backend-2:
    build: ../services/go-backend
    environment:
      BACKEND_NAME: go-2
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9000/healthz"]
      interval: 5s
      timeout: 2s
      retries: 5
    networks:
      - stand

  go-backend-3:
    build: ../services/go-backend
    environment:
      BACKEND_NAME: go-3
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9000/healthz"]
      interval: 5s
      timeout: 2s
      retries: 5
    networks:
      - stand

  java-backend:
    build: ../services/java-backend
    environment:
      BACKEND_NAME: java-1
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9000/healthz"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 15s   # JVM-старту нужно чуть больше времени, чем Go-бинарнику
    networks:
      - stand

  # --------------------------------------------------------------------------
  # gRPC-эквивалент go-backend: тот же контракт (см. grpc/proto/check.proto),
  # но rpc highload.CheckService/Check вместо POST /check. Пул из 2 инстансов
  # заведён в HAProxy (frontend fe_grpc :8090 → backend be_grpc, см.
  # haproxy/haproxy.cfg) — отдельно от be_check_pool, т.к. gRPC-бэкенды не
  # REST. Порт :9100 (не :9000, чтобы не конфликтовать с go-backend при
  # локальном запуске обоих одновременно). Публикация порта наружу не нужна —
  # доступ только через haproxy:8090.
  # --------------------------------------------------------------------------
  grpc-backend-1:
    build:
      context: ..
      dockerfile: services/grpc-backend/Dockerfile
    environment:
      BACKEND_NAME: grpc-1
    networks:
      - stand

  grpc-backend-2:
    build:
      context: ..
      dockerfile: services/grpc-backend/Dockerfile
    environment:
      BACKEND_NAME: grpc-2
    networks:
      - stand

  # --------------------------------------------------------------------------
  # Клиенты-нагрузчики. Не стартуют при `docker compose up` — только по
  # запросу через свой profile, см. README ("Запуск").
  # --------------------------------------------------------------------------
  client-go:
    build: ../clients/go
    profiles: ["load"]
    environment:
      TARGET: http://haproxy:8080/check   # h2c prior-knowledge, полный HTTP/2 end-to-end
      PAYLOAD: /payload/sample-request.json
    volumes:
      - ./payload:/payload:ro
    depends_on:
      - haproxy
    networks:
      - stand

  client-java:
    build: ../clients/java
    profiles: ["load-java"]
    environment:
      TARGET: http://haproxy:8081/check   # HTTP/1.1-фронтенд — см. комментарий в haproxy.cfg
      PAYLOAD: /payload/sample-request.json
    volumes:
      - ./payload:/payload:ro
    depends_on:
      - haproxy
    networks:
      - stand

  # gRPC-клиенты: build context — корень стенда (см. clients/grpc-go/Dockerfile
  # и clients/grpc-java/Dockerfile — оба тянут grpc/gen или grpc/proto вместе
  # с исходниками клиента). TARGET здесь — голый host:port (grpc.NewClient /
  # ManagedChannelBuilder.forTarget ожидают именно так, без схемы http://),
  # в отличие от client-go/client-java, где TARGET — полный URL.
  client-grpc-go:
    build:
      context: ..
      dockerfile: clients/grpc-go/Dockerfile
    profiles: ["load-grpc"]
    environment:
      TARGET: haproxy:8090   # h2c prior-knowledge (fe_grpc) — см. haproxy.cfg
      PAYLOAD: /payload/sample-request.json
    volumes:
      - ./payload:/payload:ro
    depends_on:
      - haproxy
      - grpc-backend-1
      - grpc-backend-2
    networks:
      - stand

  client-grpc-java:
    build:
      context: ..
      dockerfile: clients/grpc-java/Dockerfile
    profiles: ["load-grpc-java"]
    environment:
      TARGET: haproxy:8090   # h2c prior-knowledge (fe_grpc) — контраст с client-java на :8081/<BADREQ> на :8080
      PAYLOAD: /payload/sample-request.json
    volumes:
      - ./payload:/payload:ro
    depends_on:
      - haproxy
      - grpc-backend-1
      - grpc-backend-2
    networks:
      - stand

networks:
  stand:
    driver: bridge
