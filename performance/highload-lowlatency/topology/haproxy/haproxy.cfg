# ============================================================================
# HAProxy L7 (HTTP/2, cleartext h2c) — правильная схема для стенда highload-lowlatency
# ============================================================================
#
# В отличие от haproxy-l4.cfg (TCP passthrough), здесь HAProxy работает как
# полноценный L7-прокси: терминирует HTTP/2-соединение клиента, видит отдельные
# HTTP/2-streams внутри одного TCP-соединения и распределяет КАЖДЫЙ запрос
# (не TCP-соединение целиком) по бэкендам согласно алгоритму балансировки.
#
# SLA стенда: проверка на бэкенде — 100-200 мс, бюджет всего ответа — < 300 мс.
# Таймауты ниже подобраны так, чтобы укладываться в этот бюджет с запасом на
# сетевые задержки внутри docker-compose (обычно единицы мс).

global
    # Логи — в stdout контейнера через локальный syslog HAProxy (удобно для `docker compose logs`).
    log stdout format raw local0

    # Максимум одновременных соединений на процесс — с запасом под 2000-5000 rps теста.
    maxconn 20000

defaults
    # Наследуется frontend/backend, если не переопределено явно.
    mode http

    log global

    # HTTP-специфичные логи (метод, статус, тайминги) — полезно при разборе latency.
    option httplog

    # Таймаут ожидания клиента перед установкой соединения (защита от медленных/зависших клиентов).
    timeout client 2s

    # Таймаут на установление TCP-соединения с бэкендом. 100мс — с большим запасом,
    # т.к. внутри docker-compose сеть локальная и connect происходит за единицы мс;
    # если TCP-коннект не устанавливается за 100мс — бэкенд, вероятнее всего, недоступен.
    timeout connect 100ms

    # Таймаут ожидания ответа от бэкенда. Проверка на бэкенде занимает 100-200мс (см. README),
    # т.е. верхняя граница — 200мс. 500мс даёт запас ~2.5x над худшим случаем проверки,
    # но всё ещё укладывается в общий бюджет 300мс на запрос ТОЛЬКО если фактическая
    # длительность близка к номиналу; таймаут — это защита от зависшего бэкенда,
    # а не расчётная величина SLA (см. также retries/option redispatch ниже).
    timeout server 500ms

    # Таймаут простоя keep-alive соединения клиент-HAProxy.
    timeout http-keep-alive 1s

    # Таймаут ожидания следующего запроса в рамках keep-alive соединения.
    timeout http-request 5s

    # Если бэкенд не ответил за timeout server и остались retries — пробуем ДРУГОЙ
    # бэкенд из пула (redispatch), а не тот же самый повторно. Важно для равномерного
    # обхода упавшего/подвисшего инстанса.
    option redispatch

    # Одна попытка повтора при ошибке коннекта/таймауте к бэкенду.
    # ВНИМАНИЕ: retry безопасен ТОЛЬКО для идемпотентных запросов (health-check, GET).
    # POST /check в этом стенде — детерминированная имитация проверки без побочных
    # эффектов (нет записи состояния), поэтому повтор допустим; в реальном проде retry
    # POST-запросов нужно включать только если бэкенд гарантированно идемпотентен
    # (например, request_id используется для дедупликации).
    retries 1

# ----------------------------------------------------------------------------
# Frontend: приём клиентских соединений по h2c (HTTP/2 cleartext, без TLS)
# ----------------------------------------------------------------------------
frontend fe_http2
    # `proto h2` включает HTTP/2 без TLS (h2c) — ALPN недоступен без TLS,
    # поэтому протокол на этом listener фиксируется явно.
    # Вся сеть между сервисами — внутренняя сеть docker-compose, TLS не нужен.
    bind :8080 proto h2

    default_backend be_check_pool

# ----------------------------------------------------------------------------
# Frontend: приём клиентских соединений по обычному HTTP/1.1 (без h2c)
# ----------------------------------------------------------------------------
# Нужен для клиентов, которые не умеют h2c prior-knowledge — в частности,
# JDK java.net.http.HttpClient: он отправляет HTTP/1.1-запрос с заголовком
# `Upgrade: h2c` вместо прямого HTTP/2-preface, а фронтенд `fe_http2` выше
# (bind :8080 proto h2) ожидает именно prior-knowledge и отвечает <BADREQ>
# на такой апгрейд. Здесь — обычный HTTP/1.1-listener (mode http наследуется
# из defaults, `proto h2` намеренно не указан), поэтому client↔HAProxy идёт
# по HTTP/1.1, а HAProxy↔backend всё равно поднимается по HTTP/2 (см.
# `proto h2` на серверах в be_check_pool ниже) — сам пул один и тот же для
# обоих фронтендов. Подробности и причина ограничения JDK — в README стенда
# и в статье серии про JVM-клиент.
frontend fe_h1
    bind :8081

    default_backend be_check_pool

# ----------------------------------------------------------------------------
# Backend: пул из 3 Go-инстансов + 1 Java-инстанс, HTTP/2 до бэкендов тоже h2c
# ----------------------------------------------------------------------------
backend be_check_pool
    # Балансировка round-robin — равномерно по кругу между всеми healthy-серверами.
    # Подходит как базовая точка сравнения для стенда (в статьях серии сравним
    # с leastconn и другими алгоритмами при неравномерной длительности проверки).
    balance roundrobin

    # Health-check по HTTP по эндпоинту /healthz, а не только TCP-connect —
    # так HAProxy видит именно готовность приложения, а не просто открытый порт.
    option httpchk GET /healthz

    # http-reuse safe — переиспользовать keep-alive соединение до бэкенда для
    # следующего запроса, если предыдущий обмен завершён чисто (нет привязки
    # запроса к конкретному TCP-соединению вроде NTLM/client-cert). Это уменьшает
    # накладные расходы на установление HTTP/2-соединений к бэкендам под нагрузкой.
    http-reuse safe

    # proto h2 — соединение к бэкенду тоже поднимается как h2c (бэкенды слушают h2c на :9000).
    # check — используется активный health-check (httpchk выше) для этого сервера.
    server go-backend-1 go-backend-1:9000 proto h2 check
    server go-backend-2 go-backend-2:9000 proto h2 check
    server go-backend-3 go-backend-3:9000 proto h2 check
    server java-backend  java-backend:9000  proto h2 check
