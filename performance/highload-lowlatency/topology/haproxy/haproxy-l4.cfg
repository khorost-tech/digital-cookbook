# ============================================================================
# HAProxy L4 (TCP passthrough) — конфиг ДЛЯ СРАВНЕНИЯ, не для продакшена стенда
# ============================================================================
#
# !!! ПРЕДУПРЕЖДЕНИЕ / иллюстрация мифа "1 TCP-соединение = 1 backend-запрос" !!!
#
# В `mode tcp` HAProxy работает на уровне L4: он видит только байты TCP-потока
# и НЕ понимает протокол HTTP/2 внутри него — фрейминг, streams, мультиплексирование
# для него не существуют. Балансировка (в т.ч. `balance roundrobin`) применяется
# ОДИН РАЗ — в момент установления TCP-соединения — и выбранный backend получает
# ВСЁ соединение целиком на всё время его жизни.
#
# Клиент с HTTP/2 обычно держит одно долгоживущее TCP-соединение и мультиплексирует
# в нём множество параллельных запросов (streams). В L4-режиме ВСЕ эти запросы,
# сколько бы их ни было, уйдут на ОДИН И ТОТ ЖЕ backend, выбранный при коннекте —
# то есть balance roundrobin в TCP-режиме балансирует СОЕДИНЕНИЯ, а не запросы.
# Это и есть миф "1 TCP = 1 backend": при малом числе долгоживущих h2-соединений
# нагрузка распределяется по пулу крайне неравномерно (вплоть до того, что один
# инстанс из пула не получит ни одного запроса, пока клиент не переоткроет
# соединение). Именно поэтому реальная схема стенда — L7 (см. haproxy.cfg):
# только терминируя HTTP/2 и разбирая streams, HAProxy может распределять
# ОТДЕЛЬНЫЕ запросы по разным бэкендам в рамках одного клиентского соединения.
#
# Этот файл существует только для контролируемого сравнения L4 vs L7 в статьях
# серии (см. README) — не использовать как рабочую конфигурацию.

global
    log stdout format raw local0
    maxconn 20000

defaults
    mode tcp
    log global

    # option tcplog — логируем TCP-сессии (в mode tcp option httplog недоступен,
    # т.к. HAProxy не разбирает HTTP-уровень).
    option tcplog

    timeout client 2s

    # Таймаут коннекта к бэкенду — тот же смысл, что и в L7-конфиге: локальная
    # сеть docker-compose, 100мс — с большим запасом.
    timeout connect 100ms

    # В TCP-режиме "server"-таймаут — это таймаут неактивности данных на уже
    # установленном соединении, а не таймаут одного HTTP-запроса (HAProxy не видит
    # границ запросов). Держим тот же бюджет 500мс для сопоставимости с L7-конфигом,
    # но семантика отличается: здесь это простой TCP-потока, а не время ответа.
    timeout server 500ms

# ----------------------------------------------------------------------------
# Frontend: приём TCP-соединений на :8080 — протокол внутри HAProxy не разбирается
# ----------------------------------------------------------------------------
frontend fe_tcp
    bind :8080

    default_backend be_check_pool_tcp

# ----------------------------------------------------------------------------
# Backend: те же 4 сервера пула, но БЕЗ `proto h2` — балансировка идёт по
# TCP-соединениям целиком, а не по HTTP/2-streams внутри них (см. предупреждение выше).
# ----------------------------------------------------------------------------
backend be_check_pool_tcp
    # balance roundrobin здесь распределяет НОВЫЕ TCP-СОЕДИНЕНИЯ по кругу,
    # а не отдельные запросы — при малом числе долгоживущих h2-соединений
    # даёт неравномерную нагрузку на пул (см. предупреждение вверху файла).
    balance roundrobin

    # В mode tcp health-check по умолчанию — обычный TCP-connect (нет httpchk,
    # т.к. HAProxy не разбирает HTTP на этом уровне). Проверяется только то,
    # что порт 9000 открыт и принимает соединение, а не готовность приложения.
    server go-backend-1 go-backend-1:9000 check
    server go-backend-2 go-backend-2:9000 check
    server go-backend-3 go-backend-3:9000 check
    server java-backend  java-backend:9000  check
