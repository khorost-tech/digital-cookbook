# Inventory демо-стенда: 3-нодный кластер OpenSearch
# Синтетические хосты — замените на свои VM/тестовые хосты перед запуском.

[os-cluster]
os-node-1 ansible_host=10.0.0.11
os-node-2 ansible_host=10.0.0.12
os-node-3 ansible_host=10.0.0.13

[os-cluster:vars]
ansible_user=deploy
ansible_python_interpreter=/usr/bin/python3
