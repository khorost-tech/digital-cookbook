# Inventory демо-стенда: 3-нодный кластер OpenSearch
# Синтетические хосты — замените на свои VM/тестовые хосты перед запуском.
#
# ip= и roles= читает официальный плейбук opensearch-project/ansible-playbook:
# discovery.seed_hosts и cluster.initial_cluster_manager_nodes он выводит именно
# из roles= по всем хостам группы [os-cluster], отдельно их указывать не нужно.
# Три master-eligible ноды (кворум 2 из 3), две из них — дополнительно ingest.

[os-cluster]
os-node-1 ansible_host=10.0.0.11 ip=10.0.0.11 roles=data,master,ingest
os-node-2 ansible_host=10.0.0.12 ip=10.0.0.12 roles=data,master
os-node-3 ansible_host=10.0.0.13 ip=10.0.0.13 roles=data,master,ingest

[os-cluster:vars]
ansible_user=deploy
ansible_python_interpreter=/usr/bin/python3
