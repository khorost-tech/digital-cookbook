---
# config.yml — динамическая конфигурация security plugin: authc/authz-домены.
# КРИТИЧНО: без хотя бы одного authentication domain у кластера нет ни одного способа
# аутентификации (securityadmin.sh -cd падает с exit 255, если файла нет вовсе).
# Здесь — минимальный basic-auth против internal_users.yml.

_meta:
  type: "config"
  config_version: 2

config:
  dynamic:
    http:
      anonymous_auth_enabled: false
    authc:
      basic_internal_auth_domain:
        description: "HTTP Basic против встроенной базы пользователей (internal_users.yml)"
        http_enabled: true
        transport_enabled: true
        order: 0
        http_authenticator:
          type: basic
          challenge: true
        authentication_backend:
          type: internal
