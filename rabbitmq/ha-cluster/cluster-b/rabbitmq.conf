# Конфиг для rabbit-b — отдельный одиночный кластер (downstream для federation demo).
# НЕ содержит peer_discovery — rabbit-b не вступает в кластер rabbit1/2/3.
# Federation upstream (rabbit1) настраивается скриптом federation-demo.sh.

# Декларативная загрузка определений (пользователи, vhost, права)
load_definitions = /etc/rabbitmq/definitions.json

# Метрики Prometheus (опционально)
prometheus.return_per_object_metrics = true
