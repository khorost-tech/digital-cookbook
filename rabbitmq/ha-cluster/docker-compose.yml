x-rabbit: &rabbit
  image: rabbitmq:4.3-management
  environment:
    RABBITMQ_ERLANG_COOKIE: "DEMOCOOKIE0123456789"
  volumes:
    - ./cluster/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    - ./cluster/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    - ./cluster/definitions.json:/etc/rabbitmq/definitions.json:ro
  healthcheck:
    test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
    interval: 10s
    timeout: 5s
    retries: 10

services:
  rabbit1:
    <<: *rabbit
    hostname: rabbit1
    container_name: rabbit1
    ports: ["5672:5672", "15672:15672", "15692:15692"]
  rabbit2:
    <<: *rabbit
    hostname: rabbit2
    container_name: rabbit2
    ports: ["5673:5672", "15673:15672"]
  rabbit3:
    <<: *rabbit
    hostname: rabbit3
    container_name: rabbit3
    ports: ["5674:5672", "15674:15672"]

  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    networks:
      - default
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.4.0
    container_name: grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3000:3000"]
    depends_on:
      - prometheus
    networks:
      - default
    restart: unless-stopped

networks:
  default:
    name: rabbitnet
