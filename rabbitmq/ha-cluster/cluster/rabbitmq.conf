# Декларативная загрузка определений (vhosts, users, policies, queues)
load_definitions = /etc/rabbitmq/definitions.json

# Кластеризация через classic config (статический список нод)
cluster_formation.peer_discovery_backend = classic_config
cluster_formation.classic_config.nodes.1 = rabbit@rabbit1
cluster_formation.classic_config.nodes.2 = rabbit@rabbit2
cluster_formation.classic_config.nodes.3 = rabbit@rabbit3

# В RabbitMQ 4.3 стратегии partition handling (pause_minority/autoheal/ignore) удалены.
# Доступность кластера определяется кворумом Raft (Khepri + quorum queues) автоматически —
# отдельная настройка через cluster_partition_handling не нужна и не действует.
prometheus.return_per_object_metrics = true
