---
# Пример файла секретов для PROD-окружения.
# Скопируйте этот файл в secrets.yml и ЗАШИФРУЙТЕ через ansible-vault:
#
#   cp group_vars/prod/secrets.example.yml group_vars/prod/secrets.yml
#   ansible-vault encrypt group_vars/prod/secrets.yml
#
# secrets.yml НЕ должен попасть в git (добавлен в .gitignore).
# При запуске плейбука добавьте флаг: --ask-vault-pass  или  --vault-password-file ~/.vault_pass

app_admin_token: "REPLACE-ME"
