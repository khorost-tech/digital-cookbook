server_name: b2
listen: 0.0.0.0:4222
http: 0.0.0.0:8222

accounts {
  SYS: {
    users: [{user: sys, password: sysdemo}]
  }
}
system_account: SYS

jetstream {
  store_dir: /data
  max_memory_store: 256MB
  max_file_store: 2GB
}

cluster {
  name: cluster-b
  listen: 0.0.0.0:6222
  routes: ["nats://b1:6222"]
}

# Каждая нода кластера принимает gateway-соединения на собственном порту —
# gateway работает на уровне ноды, а не кластера как единого целого, хотя
# соседний supercluster обычно устанавливает только одно исходящее
# соединение к случайно выбранной ноде из cluster.gateways[].urls.
gateway {
  name: cluster-b
  listen: 0.0.0.0:7222
  gateways: [
    {name: cluster-a, url: "nats://a1:7222"}
  ]
}
