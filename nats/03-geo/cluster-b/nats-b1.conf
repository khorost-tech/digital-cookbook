server_name: b1
listen: 0.0.0.0:4222
http: 0.0.0.0:8222

# Тот же $SYS-аккаунт, что и в cluster-a (см. комментарий там). $G остаётся
# без аутентификации, потому что SYS — единственный аккаунт с users.
accounts {
  SYS: {
    users: [{user: sys, password: sysdemo}]
  }
}
system_account: SYS

jetstream {
  store_dir: /data
  max_memory_store: 256MB
  max_file_store: 2GB
}

cluster {
  name: cluster-b
  listen: 0.0.0.0:6222
  routes: ["nats://b2:6222"]
}

gateway {
  name: cluster-b
  listen: 0.0.0.0:7222
  gateways: [
    {name: cluster-a, url: "nats://a1:7222"}
  ]
}
