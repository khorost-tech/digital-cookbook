server_name: a1
listen: 0.0.0.0:4222
http: 0.0.0.0:8222

# gateway + leafnodes вместе требуют настроенного $SYS-аккаунта (nats-server
# на старте иначе завершится с ошибкой). $G остаётся без аутентификации —
# единственный аккаунт с users здесь SYS, поэтому implicit no_auth_user для
# $G не отключается (см. GHSA-fr2g-9hjm-wr23, исправлено в 2.10.2+).
accounts {
  SYS: {
    users: [{user: sys, password: sysdemo}]
  }
}
system_account: SYS

jetstream {
  store_dir: /data
  max_memory_store: 256MB
  max_file_store: 2GB
}

# cluster{} с одной нодой: routes указывает на себя же (self-route
# игнорируется при установке соединений), но конфиг с непустым routes
# нужен, иначе JetStream отказывается стартовать в присутствии gateway —
# он трактует статичное имя кластера (см. gateway.name) как сигнал
# "это кластер", и требует либо routes, либо solicited leafnode для $SYS.
cluster {
  name: cluster-a
  listen: 0.0.0.0:6222
  routes: ["nats://a1:6222"]
}

gateway {
  name: cluster-a
  listen: 0.0.0.0:7222
  gateways: [
    {name: cluster-b, urls: ["nats://b1:7222", "nats://b2:7222"]}
  ]
}

leafnodes {
  listen: 0.0.0.0:7422
}
