services:
  nats:
    image: nats:2.12
    command: ["-js", "-sd", "/data", "-m", "8222"]  # JetStream включён, store dir /data, мониторинг на :8222
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - "./data:/data"

  nats-exporter:
    image: natsio/prometheus-nats-exporter:latest
    command: ["-varz", "-connz", "-routez", "-subz", "-jsz=all", "-p", "7777", "http://nats:8222"]
    ports:
      - "7777:7777"
    depends_on:
      - nats

  prometheus:
    image: prom/prometheus:v3.10.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - nats-exporter

  grafana:
    image: grafana/grafana:12.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
