// static-accounts.conf — ДЕМО-конфиг, статические accounts (user/password).
// Демонстрирует: изоляцию subject-namespace между двумя accounts, permissions
// (publish/subscribe allow/deny) и один export/import между ними.
//
// Пароли ниже — учебные, во весь голос «demo». nats-server честно предупредит
// в логах "Plaintext passwords detected, use nkeys or bcrypt" — это ожидаемо
// для статической модели; в проде — bcrypt-хеш пароля (nats-server сам умеет
// проверять `$2a$...`) или переход на nkeys/decentralized JWT (см. README и
// статью, раздел «Аутентификация: три модели»).

port: 4222
monitor_port: 8222

accounts {
  APP_A: {
    users: [
      {
        user: alice
        password: alice_demo_pw
        permissions: {
          publish: { allow: ["app.a.>"] }
          subscribe: { allow: ["app.a.>", "_INBOX.>"] }
        }
      }
    ]

    # APP_A публикует публичный (не требующий явного разрешения на
    # конкретный account) stream-export — любой account может его импортировать.
    exports: [
      { stream: "app.a.public.>" }
    ]
  }

  APP_B: {
    users: [
      {
        user: bob
        password: bob_demo_pw
        permissions: {
          publish: { allow: ["app.b.>"] }
          subscribe: { allow: ["app.b.>", "from-a.>", "_INBOX.>"] }
        }
      }
    ]

    # APP_B импортирует поток APP_A и перекладывает его в свой локальный
    # namespace под префиксом from-a.* — без этого экспорта/импорта bob
    # никогда не увидит ничего из app.a.>, даже с широкими subscribe-правами.
    imports: [
      { stream: { account: APP_A, subject: "app.a.public.>" }, prefix: "from-a" }
    ]
  }
}
