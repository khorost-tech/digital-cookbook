// resolver.conf — ШАБЛОН конфигурации decentralized JWT resolver для 05-security.
//
// Это НЕ рабочий конфиг — operator/account JWT ниже вымышленные (укорочены,
// подпись невалидна). Настоящий resolver.conf с реальными JWT операторов и
// аккаунтов генерируется локально командой `nsc generate config` (см. README,
// шаг 3) и НЕ коммитится — файл целиком уходит в .gitignore под именем
// resolver.generated.conf. Токены JWT сами по себе не секрет (это подписанные
// утверждения о правах, публичный ключ проверяем через подпись operator'а),
// но приватные ключи (seed) для их переиздания хранятся в nsc/stores —
// вот их коммитить нельзя ни при каких условиях.
//
// Структура ниже — то, что реально понадобится на сервере после генерации:

// Operator "DEMO" — JWT, подписанный приватным ключом operator'а.
// operator: eyJ0eXAiOiJKV1QiLCJhbGciOiJlZDI1NTE5LW5rZXkifQ...(вымышленный, укорочен)...

// system_account — обязателен, когда сервер использует decentralized JWT auth.
system_account: AA4JDVAHQEQKS2XUUW3NPN76SWI24JMVLSGYP7CZMB3KE7C6FISGGI5S

// Тип resolver — для этого демо-стенда MEMORY: JWT аккаунтов встраиваются
// прямо в конфиг (resolver_preload), сервер не ходит ни в файловую систему,
// ни по URL за ними. Годится для демо и CI, не годится для прода с часто
// меняющимся набором аккаунтов — там нужен NATS-based resolver (type: full,
// с директорией на диске и синхронизацией через $SYS) или URL resolver
// (HTTP-эндпоинт, отдающий JWT по account ID). Все три типа описаны в README.
resolver: MEMORY

resolver_preload: {
  // Account "SYS": <JWT>
  // Account "APP_A": <JWT>
  // Account "APP_B": <JWT>
  //
  // Реальные строки — вывод `nsc generate config --mem-resolver`, см. README.
}

port: 4222
monitor_port: 8222
