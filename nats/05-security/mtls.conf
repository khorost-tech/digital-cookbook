// mtls.conf — ДЕМО-конфиг сервера с обязательным mTLS.
// Сертификаты — из tls/, генерируются gen-certs.sh (см. README, шаг 2).
// Демо-CA, демо-ключи. Не для продакшна.

port: 4222
monitor_port: 8222

tls {
  cert_file: "/etc/nats/tls/server-cert.pem"
  key_file: "/etc/nats/tls/server-key.pem"
  ca_file: "/etc/nats/tls/ca.pem"
  verify: true
}
