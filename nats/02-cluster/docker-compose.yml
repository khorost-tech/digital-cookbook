services:
  n1:
    image: nats:2.12
    hostname: n1
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - "./nats-1.conf:/etc/nats/nats.conf:ro"
      - "./data-1:/data"
    ports:
      - "4222:4222"
      - "8222:8222"

  n2:
    image: nats:2.12
    hostname: n2
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - "./nats-2.conf:/etc/nats/nats.conf:ro"
      - "./data-2:/data"
    ports:
      - "4223:4222"
      - "8223:8222"

  n3:
    image: nats:2.12
    hostname: n3
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - "./nats-3.conf:/etc/nats/nats.conf:ro"
      - "./data-3:/data"
    ports:
      - "4224:4222"
      - "8224:8222"
